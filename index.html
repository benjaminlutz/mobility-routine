<title>Tägliche Mobility-Routine</title>
<style>
  :root{
    --bg:#0f1720;
    --card:#182430;
    --card2:#1f2f3d;
    --accent:#4fd1c5;
    --accent2:#38bdf8;
    --text:#e8eef3;
    --muted:#8fa3b3;
    --line:#2b3d4d;
    --good:#34d399;
    --warn:#fbbf24;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%, #1b2a38 0%, var(--bg) 60%);
    color:var(--text);
    height:100vh;
    height:100dvh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    padding:16px;
    padding-top:calc(16px + env(safe-area-inset-top));
    padding-bottom:calc(16px + env(safe-area-inset-bottom));
    padding-left:calc(16px + env(safe-area-inset-left));
    padding-right:calc(16px + env(safe-area-inset-right));
  }
  .app{
    width:100%;
    max-width:480px;
    height:100%;
    display:flex;
    flex-direction:column;
    gap:12px;
    min-height:0;              /* erlaubt dem Scrollbereich zu schrumpfen */
  }
  /* App-Shell: Kopf + Fußzeile fix, nur der mittlere Bereich scrollt */
  header, .progress, #footer{flex:none;}
  #screen{
    flex:1 1 auto;
    min-height:0;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:2px;              /* verhindert das Abschneiden des Karten-Schattens */
  }
  #footer:empty{display:none;}

  header{display:flex;align-items:flex-start;gap:12px;}
  header .htext{flex:1;}
  header h1{font-size:19px;margin:0;font-weight:650;letter-spacing:.2px;}
  header p{margin:2px 0 0;color:var(--muted);font-size:13px;}
  .voicebtn{
    flex:none;border:1px solid var(--line);background:var(--card2);color:var(--text);
    width:42px;height:42px;border-radius:12px;font-size:20px;cursor:pointer;line-height:1;
    display:flex;align-items:center;justify-content:center;transition:.15s;
  }
  .voicebtn:active{transform:scale(.94);}
  .voicebtn.off{opacity:.5;}

  /* progress */
  .progress{display:flex;align-items:center;gap:10px;}
  .dots{display:flex;gap:7px;flex:1;}
  .dot{height:6px;flex:1;border-radius:6px;background:var(--line);transition:.3s;}
  .dot.done{background:var(--accent);}
  .dot.active{background:var(--accent2);box-shadow:0 0 0 2px rgba(56,189,248,.25);}
  .counter{font-size:13px;color:var(--muted);white-space:nowrap;}

  /* card */
  .card{
    background:linear-gradient(180deg,var(--card2),var(--card));
    border:1px solid var(--line);
    border-radius:18px;
    padding:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
  }
  .exname{font-size:22px;font-weight:700;margin:0 0 4px;}
  .badge{
    display:inline-block;font-size:12px;color:#062a26;background:var(--accent);
    padding:3px 10px;border-radius:20px;font-weight:600;margin-bottom:2px;
  }

  /* animation stage */
  .stage{
    background:radial-gradient(400px 200px at 50% 30%, #223341, #16222d);
    border:1px solid var(--line);
    border-radius:14px;
    margin:14px 0;
    display:flex;justify-content:center;align-items:center;
    aspect-ratio: 3 / 2;
    overflow:hidden;
  }
  .stage svg{width:100%;height:100%;display:block;}

  /* instruction list */
  ul.steps{margin:16px 0 0;padding-left:18px;color:var(--text);font-size:14px;line-height:1.55;}
  ul.steps li{margin-bottom:4px;}

  /* metric area (timer / reps) */
  .metric{
    margin-top:16px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:16px;text-align:center;
  }
  .metric .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

  /* Kreis-Fortschrittsring */
  .ringwrap{position:relative;width:176px;height:176px;margin:12px auto 6px;}
  .ring{width:100%;height:100%;transform:rotate(-90deg);}
  .ringtrack{fill:none;stroke:var(--line);stroke-width:8;}
  .ringprog{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;
    transition:stroke-dashoffset .95s linear, stroke .3s;}
  .ringprog.warn{stroke:var(--warn);}
  .time{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:46px;font-weight:750;font-variant-numeric:tabular-nums;line-height:1;}
  .time.pulse{color:var(--warn);}
  .reps-num{font-size:56px;font-weight:750;line-height:1.05;margin:2px 0;color:var(--accent);}
  .sub{font-size:13px;color:var(--muted);margin-top:2px;}

  /* Vorbereitungs-Countdown-Overlay */
  .overlay{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;
    align-items:center;justify-content:center;background:rgba(10,16,22,.94);}
  .overlay.hidden{display:none;}
  .ov-label{color:var(--accent2);font-size:19px;font-weight:650;margin-bottom:14px;
    min-height:22px;text-align:center;padding:0 24px;letter-spacing:.3px;}
  .ov-num{font-size:150px;font-weight:800;color:var(--accent);line-height:1;}
  .ov-num.go{color:var(--good);font-size:96px;}
  .ov-num.pop{animation:pop .9s ease-out;}
  @keyframes pop{
    0%{transform:scale(.3);opacity:0;}
    22%{transform:scale(1.18);opacity:1;}
    55%{transform:scale(1);opacity:1;}
    100%{transform:scale(.8);opacity:.12;}
  }

  .controls{display:flex;gap:10px;justify-content:center;margin-top:12px;}
  .btn{
    border:none;border-radius:12px;padding:12px 18px;font-size:15px;font-weight:650;cursor:pointer;
    transition:.15s;flex:1;max-width:150px;
  }
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--accent);color:#04231f;}
  .btn-ghost{background:var(--card2);color:var(--text);border:1px solid var(--line);}
  .btn-done{background:var(--good);color:#04231f;}

  /* footer nav */
  .nav{display:flex;gap:12px;}
  .nav .btn{max-width:none;}
  .btn[disabled]{opacity:.35;cursor:not-allowed;}

  /* finish screen */
  .finish{text-align:center;padding:30px 18px;}
  .finish .big{font-size:52px;}
  .finish h2{margin:10px 0 6px;}
  .finish p{color:var(--muted);font-size:14px;}
  .thanks{
    display:inline-block;margin-top:22px;color:var(--accent2);text-decoration:none;
    font-size:14px;font-weight:600;border:1px solid var(--line);
    padding:9px 16px;border-radius:20px;transition:.15s;
  }
  .thanks:active{transform:scale(.97);}

  .hint{font-size:12px;color:var(--muted);text-align:center;margin-top:2px;}

  /* --- shared figure styling --- */
  .fig{fill:none;stroke:var(--accent);stroke-width:6;stroke-linecap:round;stroke-linejoin:round;}
  .fig.j{fill:var(--accent);stroke:none;}
  .floor{stroke:var(--line);stroke-width:4;stroke-linecap:round;}
  .prop{stroke:var(--accent2);stroke-width:6;stroke-linecap:round;}
  .propfill{fill:var(--accent2);opacity:.9;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="htext">
      <h1>Tägliche Mobility-Routine</h1>
      <p>5 Übungen · ca. 5–10 Minuten</p>
    </div>
    <button class="voicebtn" id="voiceBtn" title="Sprachausgabe an/aus" aria-label="Sprachausgabe an/aus">🔊</button>
  </header>

  <div class="progress">
    <div class="dots" id="dots"></div>
    <div class="counter" id="counter">Übung 1 von 5</div>
  </div>

  <div id="screen"></div>
  <div id="footer"></div>
</div>

<div id="overlay" class="overlay hidden">
  <div class="ov-label" id="ovLabel"></div>
  <div class="ov-num" id="ovNum"></div>
</div>

<script>
/* ---------- Übungsdaten aus dem Video-Transkript ---------- */
const EX = [
  {

    area:"Oberschenkelrückseite / Ischias",
    steps:[

      "Oberkörper langsam aufrichten.",
      "Für mehr Intensität Becken kippen / Hüfte nach hinten schieben.",
      "Entspannt in die Position atmen und wirken lassen."
    ],
    type:"timer",
    duration:90,        // 1–2 Min pro Seite
    perSide:true,
    setsNote:"1–2 Min pro Seite"
  },
  {
    name:"Schulterkreisen mit Stab",
    area:"Nacken / Schultern / Brust",
    steps:[
      "Stab, Band oder Handtuch breiter als schulterbreit greifen.",
      "Arme langsam über den Kopf und so weit wie möglich nach hinten.",
      "Kontrolliert wieder zurückführen – keine Schnelligkeit.",
      "Griff enger machen, sobald die Bewegung leichter wird."
    ],
    type:"timer",
    duration:90,        // 1–2 Min
    perSide:false,
    setsNote:"1–2 Min"
  },
  {
    name:"Kosaken-Squat",
    area:"Innere Oberschenkel / Adduktoren",
    steps:[
      "Breit hinstellen, Hände auf die Oberschenkel.",

      "So aufrecht wie möglich bleiben, dort starten wo es leicht dehnt."
    ],
    type:"reps",
    reps:5,             // 5 bewusste Bewegungen pro Seite
    perSide:true,
    sets:3,
    setsNote:"5 Wiederholungen pro Seite · 2–3 Durchgänge"
  }
];

/* ---------- State ---------- */
let idx = 0;
let side = "L";              // aktuelle Seite bei perSide-Übungen
let remaining = 0;
let ticking = null;          // Timer-Intervall
let running = false;         // Timer läuft
let paused = false;          // Timer pausiert (Fortsetzen ohne neues 3-2-1)
let roundIdx = 0;            // aktuelle Runde/Seite (0-basiert)
let prepTimer = null;        // Timeout des 3-2-1-Countdowns
let autoTimer = null;        // Timeout für Seitenwechsel / Auto-Weiter

const screen = document.getElementById("screen");
const footer = document.getElementById("footer");
const overlay = document.getElementById("overlay");
const ovNum = document.getElementById("ovNum");
const ovLabel = document.getElementById("ovLabel");

/* ---------- Sprachausgabe (Deutsch, Web Speech API) ---------- */
let voiceOn = true;
let deVoice = null;
const spoken = new Set();   // Übungen, deren Anweisungen schon einmal vorgelesen wurden

function pickVoice(){
  if(!("speechSynthesis" in window)) return;
  const vs = speechSynthesis.getVoices();
  // bevorzugt eine deutsche Stimme
  deVoice = vs.find(v=>/^de(-|_|$)/i.test(v.lang)) || null;
}
if("speechSynthesis" in window){
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}

function utter(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "de-DE";
  if(deVoice) u.voice = deVoice;
  u.rate = 1; u.pitch = 1;
  speechSynthesis.speak(u);
}

// Kurze Ansage (z. B. beim Timer-Start/-Ende), bricht Laufendes ab.
function say(text){
  if(!voiceOn || !("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  utter(text);
}

// Sagt den Übungsnamen an; beim allerersten Aufruf zusätzlich die Anweisungen.
function announce(){
  if(!voiceOn || !("speechSynthesis" in window)) return;
  const e = EX[idx];
  speechSynthesis.cancel();                 // laufende Ansage abbrechen (schnelles Blättern)
  utter(e.name);
  if(!spoken.has(idx)){
    spoken.add(idx);
    utter("So funktioniert's: " + e.steps.join(" "));
  }
}

function fmt(s){
  const m = Math.floor(s/60), r = s%60;
  return m + ":" + String(r).padStart(2,"0");
}

function renderDots(){
  const d = document.getElementById("dots");
  d.innerHTML = EX.map((_,k)=>{
    let c="dot";
    if(k<idx) c+=" done";
    if(k===idx) c+=" active";
    return `<div class="${c}"></div>`;
  }).join("");
  document.getElementById("counter").textContent = `Übung ${idx+1} von ${EX.length}`;
}

function stopTimer(){
  if(ticking){clearInterval(ticking);ticking=null;}
  running=false;
}
// bricht alles ab: Timer, 3-2-1, Auto-Weiter, Overlay
function clearAllTimers(){
  stopTimer();
  if(prepTimer){clearTimeout(prepTimer);prepTimer=null;}
  if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}
  paused=false;
  hideOverlay();
}

// Anzahl der Runden einer Timer-Übung: pro Seite = 2, sonst Anzahl Durchgänge
function totalRounds(e){
  if(e.perSide) return 2;
  if(e.sets) return e.sets;
  return 1;
}

function render(){
  clearAllTimers();
  renderDots();
  const e = EX[idx];
  side = "L"; roundIdx = 0;

  let metricHTML = "";
  if(e.type==="timer"){
    remaining = e.duration;
    metricHTML = `
      <div class="metric">
        <div class="label">Timer <span id="roundLbl"></span></div>
        <div class="ringwrap">
          <svg class="ring" viewBox="0 0 120 120">
            <circle class="ringtrack" cx="60" cy="60" r="52"/>
            <circle class="ringprog" id="ringProg" cx="60" cy="60" r="52"/>
          </svg>
          <div class="time" id="time">${fmt(remaining)}</div>
        </div>
        <div class="sub">${e.setsNote}</div>
        <div class="controls">
          <button class="btn btn-primary" id="startBtn">Start</button>
          <button class="btn btn-ghost" id="resetBtn">Zurücksetzen</button>
        </div>
      </div>`;
  } else {
    metricHTML = `
      <div class="metric">
        <div class="label">Wiederholungen</div>
        <div class="reps-num">${e.reps}×</div>
        <div class="sub">${e.setsNote}</div>
        <div class="hint">Zähle die Wiederholungen bewusst und kontrolliert mit.</div>
      </div>`;
  }

  screen.innerHTML = `
    <div class="card">
      <span class="badge">${e.area}</span>
      <div class="exname">${e.name}</div>
      <div class="stage">${anim(idx)}</div>
      ${metricHTML}
      <ul class="steps">${e.steps.map(s=>`<li>${s}</li>`).join("")}</ul>
    </div>
  `;
  screen.scrollTop = 0;   // beim Übungswechsel nach oben scrollen

  footer.innerHTML = `
    <div class="nav">
      <button class="btn btn-ghost" id="prevBtn" ${idx===0?"disabled":""}>← Zurück</button>
      <button class="btn btn-primary" id="nextBtn">${idx===EX.length-1?"Fertig ✓":"Weiter →"}</button>
    </div>
  `;

  // wire nav
  document.getElementById("prevBtn").onclick=()=>{if(idx>0){idx--;render();}};
  document.getElementById("nextBtn").onclick=()=>{
    if(idx===EX.length-1){finish();} else {idx++;render();}
  };

  if(e.type==="timer"){
    updateTime();
    updateRoundLabel();
    document.getElementById("startBtn").onclick=onStartClick;
    document.getElementById("resetBtn").onclick=()=>{
      clearAllTimers(); roundIdx=0; side="L";
      remaining=e.duration; updateTime(); updateRoundLabel();
      const sb=document.getElementById("startBtn"); if(sb) sb.textContent="Start";
    };
  }

  announce();   // Übungsname (+ beim ersten Mal die Anweisungen) vorlesen
}

function updateRoundLabel(){
  const el=document.getElementById("roundLbl"); if(!el) return;
  const e=EX[idx];
  if(e.perSide) el.textContent = "· Seite "+(side==="L"?"links":"rechts");
  else if(totalRounds(e)>1) el.textContent = "· Runde "+(roundIdx+1)+" / "+totalRounds(e);
  else el.textContent = "";
}

function updateTime(){
  const t=document.getElementById("time");
  if(!t) return;
  t.textContent=fmt(remaining);
  t.classList.toggle("pulse", remaining<=10 && remaining>0);
  const prog=document.getElementById("ringProg");
  if(prog){
    const C=2*Math.PI*52;
    const dur=EX[idx].duration||1;
    const frac=Math.max(0, Math.min(1, remaining/dur));
    prog.style.strokeDasharray=C.toFixed(2);
    prog.style.strokeDashoffset=(C*(1-frac)).toFixed(2);
    prog.classList.toggle("warn", remaining<=10 && remaining>0);
  }
}

/* ---------- Vorbereitungs-Countdown-Overlay ---------- */
function showOverlay(label){ ovLabel.textContent=label||""; overlay.classList.remove("hidden"); }
function hideOverlay(){ overlay.classList.add("hidden"); ovNum.className="ov-num"; ovNum.textContent=""; }

// 3-2-1-Los als Grafik + Stimme, danach onDone()
function runPrep(label, onDone){
  stopTimer();
  if("speechSynthesis" in window) speechSynthesis.cancel();
  showOverlay(label);
  const seq=["3","2","1","Los!"];
  let i=0;
  (function step(){
    if(i>=seq.length){ hideOverlay(); onDone(); return; }
    const val=seq[i];
    ovNum.className = "ov-num" + (val==="Los!" ? " go" : "");
    ovNum.textContent = val;
    void ovNum.offsetWidth;                 // Reflow -> Pop-Animation neu auslösen
    ovNum.classList.add("pop");
    beep(val==="Los!" ? 880 : 520);
    if(voiceOn && ("speechSynthesis" in window)) utter(val);
    i++;
    prepTimer = setTimeout(step, 900);
  })();
}

/* ---------- Geführter Timer-Ablauf ---------- */
function onStartClick(){
  if(prepTimer) return;              // während des 3-2-1 nichts tun
  const btn=document.getElementById("startBtn");
  if(running){                       // läuft -> pausieren
    stopTimer(); paused=true; if(btn) btn.textContent="Weiter"; return;
  }
  if(paused){                        // fortsetzen ohne neues 3-2-1
    paused=false; startCountdown(); return;
  }
  roundIdx=0; side="L";              // kompletter Neustart der Übung
  beginRound();
}

// startet die aktuelle Runde/Seite mit Vorbereitungs-Countdown
function beginRound(){
  const e=EX[idx];
  paused=false;
  if(e.perSide) side = roundIdx===0 ? "L" : "R";
  remaining=e.duration; updateTime(); updateRoundLabel();
  let label;
  if(e.perSide) label = (side==="L" ? "Linke Seite" : "Rechte Seite") + " – mach dich bereit";
  else if(totalRounds(e)>1) label = "Runde "+(roundIdx+1)+" von "+totalRounds(e);
  else label = "Mach dich bereit";
  runPrep(label, startCountdown);
}

function startCountdown(){
  const btn=document.getElementById("startBtn");
  running=true; paused=false; if(btn) btn.textContent="Pause";
  updateTime();
  ticking=setInterval(()=>{
    remaining--; updateTime();
    if(remaining<=0){ stopTimer(); onTimerEnd(); }
  },1000);
}

function onTimerEnd(){
  const e=EX[idx];
  beep(880);
  const btn=document.getElementById("startBtn");
  if(roundIdx < totalRounds(e)-1){          // es folgt noch eine Runde / Seite
    roundIdx++;
    if(e.perSide) side = roundIdx===0 ? "L" : "R";
    updateRoundLabel();
    if(voiceOn) say(e.perSide ? "Seite wechseln!" : "Nächste Runde!");
    autoTimer=setTimeout(beginRound, 1700);
    return;
  }
  // Übung komplett fertig
  if(btn) btn.textContent="Fertig ✓";
  if(voiceOn) setTimeout(()=>say("Fertig, geschafft!"), 550);
  autoAdvance();
}

// Auto-Weiter: nach kurzer Pause zur nächsten Übung
function autoAdvance(){
  if(idx>=EX.length-1){ autoTimer=setTimeout(finish, 2200); return; }
  autoTimer=setTimeout(()=>{
    idx++; render();                        // render() sagt Name (+ ggf. Anweisungen) an
    if(EX[idx].type==="timer"){
      whenSpeechIdle(()=>{ roundIdx=0; side="L"; beginRound(); });  // startet automatisch nach der Ansage
    }
  }, 2600);
}

// wartet, bis die Sprachausgabe fertig ist (mit Mindest- und Maximalwartezeit)
function whenSpeechIdle(cb){
  const start=Date.now(), minDelay=1200, maxWait=15000;
  (function check(){
    const speaking = ("speechSynthesis" in window) && speechSynthesis.speaking;
    const el=Date.now()-start;
    if((!speaking && el>=minDelay) || el>=maxWait){ cb(); return; }
    autoTimer=setTimeout(check, 300);
  })();
}

function beep(freq){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type="sine";o.frequency.value=freq||880;
    g.gain.setValueAtTime(0.001,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.3,ctx.currentTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);
    o.start();o.stop(ctx.currentTime+0.5);
  }catch(e){}
}

function finish(){
  clearAllTimers();
  if("speechSynthesis" in window) speechSynthesis.cancel();
  footer.innerHTML="";   // Navigations-Fußzeile ausblenden
  document.getElementById("dots").innerHTML =
    EX.map(()=>`<div class="dot done"></div>`).join("");
  document.getElementById("counter").textContent="Geschafft!";
  screen.scrollTop=0;
  screen.innerHTML=`
    <div class="card finish">
      <div class="big">🎉</div>
      <h2>Routine abgeschlossen!</h2>
      <p>Alle 5 Übungen erledigt. Am besten täglich wiederholen –<br>dein Körper dankt es dir.</p>
      <div class="controls" style="margin-top:18px;">
        <button class="btn btn-done" id="againBtn">Nochmal von vorne</button>
      </div>
      <a class="thanks" href="https://youtu.be/mDvdnl7UyZs" target="_blank" rel="noopener noreferrer">🙏 Danke an Medeasway</a>
    </div>`;
  document.getElementById("againBtn").onclick=()=>{idx=0;render();};
  say("Super, fertig für heute!");   // gesprochener Abschluss-Hinweis
}

/* Laut-an/aus-Schalter */
const voiceBtn = document.getElementById("voiceBtn");
voiceBtn.onclick = ()=>{
  voiceOn = !voiceOn;
  voiceBtn.textContent = voiceOn ? "🔊" : "🔇";
  voiceBtn.classList.toggle("off", !voiceOn);
  if("speechSynthesis" in window) speechSynthesis.cancel();
  if(voiceOn) announce();   // beim Einschalten aktuelle Übung ansagen
};

/* ---------- Display wach halten (Screen Wake Lock) ---------- */
let wakeLock = null;
async function requestWake(){
  if(!("wakeLock" in navigator)) return;
  if(wakeLock) return;                              // schon aktiv
  if(document.visibilityState !== "visible") return; // nur wenn App sichtbar
  try{
    wakeLock = await navigator.wakeLock.request("screen");
    wakeLock.addEventListener("release", ()=>{
      wakeLock = null;
      // iOS gibt die Sperre von selbst frei -> sofort erneut anfordern, solange sichtbar
      if(document.visibilityState === "visible") requestWake();
    });
  }catch(e){ wakeLock = null; /* z. B. kein Nutzer-Gesture oder nicht unterstützt */ }
}
// Beim Zurückkehren zur App erneut anfordern
document.addEventListener("visibilitychange", ()=>{
  if(document.visibilityState === "visible") requestWake();
});
// iOS verlangt für die erste Anforderung meist eine Nutzer-Interaktion – daher bei jedem Tippen sicherstellen
document.addEventListener("pointerdown", requestWake);
// Sicherheitsnetz: regelmäßig prüfen und ggf. neu anfordern
setInterval(requestWake, 15000);
requestWake();

render();
</script>
